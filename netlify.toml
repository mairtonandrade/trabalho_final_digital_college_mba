[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

# Modo demo obrigatório no Netlify (sem backend). Para API real, defina VITE_API_URL no painel.
[build.environment]
  NODE_VERSION = "20"
  VITE_DEMO_MODE = "true"

# SPA: todas as rotas (/analista, /gerente, /diretoria) servem index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
