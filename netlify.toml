[build]
  base = "frontend"
  command = "npm ci && npm run demo:verify && npm run build && node -e \"const fs=require('fs');const p='dist/demoSnapshot.json';if(!fs.existsSync(p)||fs.statSync(p).size<100000)throw new Error('dist/demoSnapshot.json ausente ou pequeno');console.log('OK demoSnapshot',fs.statSync(p).size)\""
  publish = "dist"

# Modo demo obrigatório no Netlify (sem backend). Para API real, defina VITE_API_URL no painel.
[build.environment]
  NODE_VERSION = "20"
  VITE_DEMO_MODE = "true"

# Redirects SPA: ver frontend/public/_redirects (não duplicar /* aqui — quebrava /demoSnapshot.json)
